services:
  libreseerr:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-YOUR_GH_USER}/libreseerr:latest
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Libreseerr
      READARR_TARGETS: '[{"name":"Books","base_url":"http://readarr:8787","api_key":"replace-me","kind":"book"},{"name":"Audiobooks","base_url":"http://readarr-audio:8787","api_key":"replace-me","kind":"audiobook"}]'
